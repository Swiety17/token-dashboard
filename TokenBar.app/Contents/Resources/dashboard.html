<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=960, initial-scale=1.0">
<title>TOKEN WATCH — Fantasy Wood Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; image-rendering: pixelated; }
body {
  margin: 0;
  background: #0c0a0f;
  font-family: "Press Start 2P", monospace;
  -webkit-font-smoothing: none;
}
.plank {
  background: linear-gradient(180deg, #9a6b42, #7a4e2e);
  border: 4px solid #241610;
  border-radius: 16px;
  box-shadow: inset 0 0 0 2px #c98a52, 0 4px 0 rgba(0,0,0,.4);
}
.orn {
  position: absolute;
  width: 20px; height: 20px;
  border: 3px solid #3a2415;
  pointer-events: none;
  opacity: .9;
}
.orn::after {
  content: "";
  position: absolute;
  width: 6px; height: 6px;
  background: #3a2415;
  border-radius: 50%;
}
.orn-tl { top: -3px; left: -3px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
.orn-tl::after { top: -4px; left: -4px; }
.orn-tr { top: -3px; right: -3px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
.orn-tr::after { top: -4px; right: -4px; }
.orn-bl { bottom: -3px; left: -3px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
.orn-bl::after { bottom: -4px; left: -4px; }
.orn-br { bottom: -3px; right: -3px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }
.orn-br::after { bottom: -4px; right: -4px; }

@keyframes swing {
  0%, 45% { transform: rotate(-45deg); }
  50%, 95% { transform: rotate(25deg); }
  100% { transform: rotate(-45deg); }
}
@keyframes shake {
  0%, 45% { transform: translateX(0); }
  50% { transform: translateX(-2px); }
  55% { transform: translateX(2px); }
  60%, 100% { transform: translateX(0); }
}
@keyframes popToken0 {
  0%, 48% { opacity: 0; transform: translate(0,0); }
  52% { opacity: 1; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(6px,-34px); }
}
@keyframes popToken1 {
  0%, 48% { opacity: 0; transform: translate(0,0); }
  52% { opacity: 1; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(-10px,-30px); }
}
@keyframes popToken2 {
  0%, 48% { opacity: 0; transform: translate(0,0); }
  52% { opacity: 1; transform: translate(0,0); }
  100% { opacity: 0; transform: translate(16px,-24px); }
}
@keyframes legStep {
  0%, 45% { transform: scaleY(1); }
  50% { transform: scaleY(0.85); }
  100%, 55% { transform: scaleY(1); }
}
</style>
</head>
<body>

<div style="min-height:100vh;position:relative;overflow:hidden;background:radial-gradient(ellipse 900px 500px at 50% 90%,#3a2430 0%,#16101a 55%,#0a0810 100%);padding:28px;display:flex;justify-content:center;">

  <!-- misty silhouettes -->
  <div style="position:absolute;left:-40px;bottom:0;width:220px;height:340px;background:radial-gradient(ellipse at 50% 100%,#0e0d14 0%,transparent 70%);filter:blur(2px)"></div>
  <div style="position:absolute;right:-60px;bottom:0;width:260px;height:380px;background:radial-gradient(ellipse at 50% 100%,#14171a 0%,transparent 70%);filter:blur(2px)"></div>
  <div style="position:absolute;left:0;right:0;bottom:0;height:90px;background:linear-gradient(180deg,transparent,#1c1a20)"></div>

  <div style="width:100%;max-width:960px;position:relative;">

    <!-- CREST -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:8px;">
      <div style="display:flex;gap:3px;margin-bottom:-6px;z-index:2;">
        <div style="width:12px;height:12px;background:#e8c040;clip-path:polygon(50% 0%,0% 100%,100% 100%)"></div>
        <div style="width:12px;height:16px;background:#e8c040;clip-path:polygon(50% 0%,0% 100%,100% 100%);margin-top:-4px"></div>
        <div style="width:12px;height:12px;background:#e8c040;clip-path:polygon(50% 0%,0% 100%,100% 100%)"></div>
      </div>
      <div style="width:46px;height:58px;background:repeating-linear-gradient(0deg,#7a4e2e,#7a4e2e 4px,#6a4226 4px,#6a4226 8px);border:3px solid #9aa5b8;clip-path:polygon(50% 0%,100% 12%,100% 60%,50% 100%,0% 60%,0% 12%);box-shadow:0 0 12px rgba(232,192,64,.25)"></div>
      <div style="color:#f0e0c0;font-size:15px;letter-spacing:2px;margin-top:14px;text-shadow:0 2px 0 #000;">TOKEN WATCH</div>
      <div id="lastSync" style="color:#8a7050;font-size:8px;margin-top:8px;">LAST SYNC: --</div>
    </div>

    <!-- MINING RIG -->
    <div class="plank" style="position:relative;padding:16px 22px;margin:22px 0 18px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;">
      <div class="orn orn-tl"></div><div class="orn orn-tr"></div><div class="orn orn-bl"></div><div class="orn orn-br"></div>
      <div style="color:#3a2415;font-size:8px;">MINING<br>RIG</div>

      <div style="position:relative;width:150px;height:84px;background:#2a1a10;border:3px solid #3a2415;border-radius:8px;overflow:hidden;flex:none;">
        <div style="position:absolute;left:0;right:0;bottom:0;height:10px;background:#1c120b;border-top:2px solid #3a2415;"></div>
        <div style="position:absolute;left:28px;bottom:10px;width:36px;height:48px;">
          <div style="position:absolute;top:0;left:8px;width:16px;height:12px;background:#d4a878;"></div>
          <div style="position:absolute;top:-4px;left:6px;width:20px;height:6px;background:#e8c040;"></div>
          <div style="position:absolute;top:12px;left:6px;width:20px;height:18px;background:#8a5a3a;"></div>
          <div style="position:absolute;top:30px;left:8px;width:6px;height:14px;background:#241610;transform-origin:top center;animation:legStep 1s steps(1,end) infinite;"></div>
          <div style="position:absolute;top:30px;left:18px;width:6px;height:14px;background:#241610;transform-origin:top center;animation:legStep 1s steps(1,end) infinite reverse;"></div>
          <div style="position:absolute;top:14px;left:22px;width:4px;height:16px;background:#d4a878;transform-origin:top center;animation:swing 1s steps(1,end) infinite;">
            <div style="position:absolute;bottom:-2px;left:-1px;width:6px;height:16px;background:#a06850;"></div>
            <div style="position:absolute;bottom:12px;left:-9px;width:22px;height:5px;background:#9aa5b8;"></div>
          </div>
        </div>
        <div style="position:absolute;right:18px;bottom:10px;width:22px;height:20px;background:#6b5a4a;border:2px solid #3a2415;animation:shake 1s steps(1,end) infinite;">
          <div style="position:absolute;top:4px;left:3px;width:6px;height:2px;background:#3a2415;"></div>
          <div style="position:absolute;top:10px;left:10px;width:8px;height:2px;background:#3a2415;"></div>
        </div>
        <div style="position:absolute;right:24px;bottom:32px;width:6px;height:6px;background:#e8c040;animation:popToken0 1s steps(1,end) infinite;"></div>
        <div style="position:absolute;right:30px;bottom:30px;width:6px;height:6px;background:#e8c040;animation:popToken1 1s steps(1,end) infinite;animation-delay:0.15s;"></div>
        <div style="position:absolute;right:18px;bottom:30px;width:6px;height:6px;background:#e8c040;animation:popToken2 1s steps(1,end) infinite;animation-delay:0.3s;"></div>
      </div>

      <div>
        <div style="color:#3a2415;font-size:7px;margin-bottom:6px;">TOKENY WYKOPANE</div>
        <div id="minedCount" style="color:#241610;font-size:18px;">0</div>
        <div id="sessionTime" style="color:#3a2415;font-size:7px;margin-top:6px;">SESJA: 00:00</div>
      </div>
    </div>

    <!-- TWO-COLUMN GRID -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">

      <!-- CLAUDE -->
      <div class="plank" style="position:relative;padding:20px;">
        <div class="orn orn-tl"></div><div class="orn orn-tr"></div><div class="orn orn-bl"></div><div class="orn orn-br"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid #3a2415;padding-bottom:10px;">
          <div style="color:#241610;font-size:12px;">CLAUDE</div>
          <div style="background:#241610;color:#e8c040;font-size:8px;padding:3px 8px;border-radius:10px;">P1</div>
        </div>
        <div id="claude-gauges"></div>
        <div style="color:#5a3f28;font-size:7px;margin:16px 0 8px;">DZIENNE TEMPO</div>
        <div id="claude-pacing" style="display:flex;gap:6px;margin-bottom:18px;"></div>
        <div id="claude-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
      </div>

      <!-- CODEX -->
      <div class="plank" style="position:relative;padding:20px;">
        <div class="orn orn-tl"></div><div class="orn orn-tr"></div><div class="orn orn-bl"></div><div class="orn orn-br"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:2px solid #3a2415;padding-bottom:10px;">
          <div style="color:#241610;font-size:12px;">CODEX</div>
          <div style="background:#241610;color:#6a9e4a;font-size:8px;padding:3px 8px;border-radius:10px;">P2</div>
        </div>
        <div id="codex-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>
        <div style="color:#5a3f28;font-size:7px;margin:18px 0 8px;">STATUS</div>
        <div style="background:#2a1a10;border:2px solid #3a2415;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
          <span style="color:#f0e0c0;font-size:8px;">NO HARD LIMIT</span>
          <span style="color:#6a9e4a;font-size:10px;">♥ ♥ ♥</span>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="plank" id="footer-plank" style="position:relative;margin-top:18px;padding:16px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:space-between;">
      <div class="orn orn-tl"></div><div class="orn orn-tr"></div><div class="orn orn-bl"></div><div class="orn orn-br"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#e8c040;font-size:12px;">▶</span>
        <span id="rec-text" style="font-size:10px;"></span>
      </div>
      <div id="footer-reset" style="color:#3a2415;font-size:7px;"></div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  TOKEN WATCH — Fantasy Wood Dashboard Engine
// ═══════════════════════════════════════════════

const DATA_URL = 'token-data.json';
const REFRESH_MS = 30000;
let totalMined = 0;
let sessionStart = Date.now();

// ── Helpers ────────────────────────────────────────────────

function fmt(n) {
  if (!n && n !== 0) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return String(n);
}

function pctColor(pct) {
  if (pct >= 90) return '#c0453a';
  if (pct >= 80) return '#e8c040';
  return '#6a9e4a';
}

// ── Mining Rig ─────────────────────────────────────────────

function updateMiningRig() {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const s = (elapsed % 60).toString().padStart(2, '0');
  document.getElementById('sessionTime').textContent = 'SESJA: ' + m + ':' + s;
  document.getElementById('minedCount').textContent = totalMined.toLocaleString('pl-PL');
}

setInterval(updateMiningRig, 1000);

// ── Build cell ─────────────────────────────────────────────

function statCell(label, value, size, color) {
  return `<div style="background:#2a1a10;border:2px solid #3a2415;border-radius:8px;padding:10px;text-align:center;">
    <div style="color:#5a3f28;font-size:6px;margin-bottom:6px;">${label}</div>
    <div style="color:${color||'#f0e0c0'};font-size:${size||'12px'};">${value}</div>
  </div>`;
}

// ── Claude ─────────────────────────────────────────────────

function renderClaude(data) {
  if (!data || !data.available) {
    document.getElementById('claude-gauges').innerHTML =
      '<div style="color:#c0453a;font-size:9px;text-align:center;padding:20px;">BRAK DANYCH</div>';
    return;
  }

  // Gauges
  let html = '';
  const buckets = data.buckets || {};
  const labelMap = { five_hour:'5 GODZIN', seven_day:'7 DNI', extra_usage:'EXTRA KREDYTY' };
  for (const [key, b] of Object.entries(buckets)) {
    const pct = b.pct || 0;
    const color = pctColor(pct);
    const resetLabel = b.remaining_min != null ? `RESET: ${b.remaining_min}MIN` : '';
    html += `<div style="margin-bottom:15px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="color:#2c1a10;font-size:8px;">${labelMap[key]||key}</span>
        <span style="color:${color};font-size:8px;">${pct}%</span>
      </div>
      <div style="height:14px;background:#2a1a10;border:2px solid #3a2415;border-radius:8px;overflow:hidden;">
        <div style="height:100%;width:${Math.min(pct,100)}%;background:${color};border-radius:8px;"></div>
      </div>
      <div style="text-align:right;margin-top:5px;color:#5a3f28;font-size:7px;">${resetLabel}</div>
    </div>`;
  }
  document.getElementById('claude-gauges').innerHTML = html;

  // Pacing dots
  const daily = data.daily || [];
  let dots = '';
  for (let i = 0; i < 7; i++) {
    const v = daily[i] || 0;
    dots += `<div style="color:${v>0?'#8a5a3a':'#5a3f28'};font-size:12px;">${v>0?'●':'○'}</div>`;
  }
  document.getElementById('claude-pacing').innerHTML = dots;

  // Stats
  document.getElementById('claude-stats').innerHTML =
    statCell('TOKENY 7D', fmt(data.total_7d), '12px') +
    statCell('PEAK DAY', fmt(data.peak_day), '12px') +
    statCell('PACING', (data.pacing||'?').toUpperCase(), '9px', '#6a9e4a') +
    statCell('ŹRÓDŁO', 'TOKENEATER', '8px');
}

// ── Codex ──────────────────────────────────────────────────

function renderCodex(data) {
  if (!data || !data.available) {
    document.getElementById('codex-stats').innerHTML =
      '<div style="color:#c0453a;font-size:9px;text-align:center;padding:20px;">BRAK DANYCH</div>';
    return;
  }
  const s = data.summary || {};
  const w = data.windows || {};
  document.getElementById('codex-stats').innerHTML =
    statCell('WĄTKÓW', s.threads||0, '12px') +
    statCell('TOKENÓW', fmt(s.total), '12px') +
    statCell('24H', fmt((w['24h']||{}).tokens||0), '10px') +
    statCell('7 DNI', fmt((w['7d']||{}).tokens||0), '10px') +
    statCell('30 DNI', fmt((w['30d']||{}).tokens||0), '10px') +
    statCell('MAX WĄTEK', fmt(s.peak), '12px');
}

// ── Footer ─────────────────────────────────────────────────

function renderFooter(claude, codex) {
  const c5h = (claude.available && claude.buckets)
    ? (claude.buckets.five_hour?.pct || 0) : 0;

  const rec = document.getElementById('rec-text');
  if (c5h >= 80) {
    rec.textContent = 'USE CODEX — CLAUDE 5H WINDOW HOT';
    rec.style.color = '#e8c040';
  } else {
    rec.textContent = 'BOTH CLEAR — USE EITHER';
    rec.style.color = '#6a9e4a';
  }

  // Claude reset info
  let resetInfo = '';
  if (claude.buckets) {
    for (const [k, b] of Object.entries(claude.buckets)) {
      if (b.remaining_min != null) {
        const labels = { five_hour:'5H', seven_day:'7D', extra_usage:'EXTRA' };
        resetInfo = `CLAUDE ${labels[k]||k} RESETS ${b.remaining_min}MIN · `;
        break;
      }
    }
  }
  document.getElementById('footer-reset').textContent = resetInfo + 'CODEX NO CAP';
}

// ── Main refresh ───────────────────────────────────────────

async function refresh() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await resp.json();
    const claude = data.claude || {};
    const codex = data.codex || {};

    // Update total mined from real token sum
    const claudeTokens = claude.total_7d || 0;
    const codexTokens = (codex.summary && codex.summary.total) || 0;
    totalMined = claudeTokens + codexTokens;

    renderClaude(claude);
    renderCodex(codex);
    renderFooter(claude, codex);

    const now = new Date();
    document.getElementById('lastSync').textContent =
      'LAST SYNC: ' + now.toLocaleTimeString('pl-PL');
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
